name: Coleta Diária de Editais

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coleta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsx scripts/coleta.ts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
      - name: Commit data
        run: |
          git config user.name "monitor-editais-bot"
          git config user.email "bot@monitor-editais"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add public/data/
          if git diff --cached --quiet; then
            echo "Sem alterações nos dados"
          else
            git commit -m "chore: atualiza dados da coleta [skip ci]"
            git push
          fi
